<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioBox Profile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .profile-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile-header {
      text-align: center;
      margin-bottom: 30px;
    }

    #profilePic {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 5px solid #667eea;
      object-fit: cover;
      margin-bottom: 20px;
      animation: fadeInScale 0.8s ease-out;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    #username {
      font-size: 32px;
      color: #333;
      margin-bottom: 10px;
      animation: fadeIn 1s ease-out 0.3s both;
    }

    #bio {
      font-size: 16px;
      color: #666;
      line-height: 1.6;
      animation: fadeIn 1s ease-out 0.5s both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .files-section {
      margin-top: 40px;
    }

    .files-section h3 {
      font-size: 24px;
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
      animation: fadeIn 1s ease-out 0.6s both;
    }

    #files {
      list-style: none;
    }

    #files li {
      animation: slideInLeft 0.6s ease-out backwards;
    }

    #files li:nth-child(1) { animation-delay: 0.7s; }
    #files li:nth-child(2) { animation-delay: 0.8s; }
    #files li:nth-child(3) { animation-delay: 0.9s; }
    #files li:nth-child(n+4) { animation-delay: 1s; }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    #files a {
      display: flex;
      align-items: center;
      padding: 15px;
      margin-bottom: 10px;
      background: #f8f9fa;
      border-radius: 10px;
      text-decoration: none;
      color: #667eea;
      font-weight: 500;
      transition: all 0.3s ease;
      border-left: 4px solid transparent;
    }

    #files a:hover {
      background: #667eea;
      color: white;
      border-left-color: #764ba2;
      transform: translateX(10px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }

    #files a::before {
      content: "📄";
      margin-right: 12px;
      font-size: 18px;
    }

    .no-files {
      text-align: center;
      color: #999;
      padding: 30px;
      font-style: italic;
      animation: fadeIn 1s ease-out 0.7s both;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
      font-size: 18px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .error {
      text-align: center;
      padding: 40px;
      color: #e74c3c;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <div id="loading" class="loading">Loading profile...</div>
    <div id="content" style="display: none;">
      <div class="profile-header">
        <img id="profilePic" alt="Profile Picture">
        <h2 id="username"></h2>
        <p id="bio"></p>
      </div>

      <div class="files-section">
        <h3>📁 Files</h3>
        <ul id="files"></ul>
        <div id="noFiles" class="no-files" style="display: none;">No files shared yet</div>
      </div>
    </div>
    <div id="error" class="error" style="display: none;"></div>
  </div>

  <script>
    const username = window.location.pathname.split("/").pop();

    fetch(`/api/files/user/${username}`)
      .then(res => {
        if (!res.ok) throw new Error('User not found');
        return res.json();
      })
      .then(data => {
        // Hide loading and show content
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        // Set profile image
        const profilePic = document.getElementById('profilePic');
        if (data.profileImage) {
          profilePic.src = "/" + data.profileImage;
        } else {
          profilePic.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150"%3E%3Crect fill="%23ccc" width="150" height="150"/%3E%3Ctext x="50%25" y="50%25" dominant-baseline="middle" text-anchor="middle" font-size="60" fill="%23999"%3E👤%3C/text%3E%3C/svg%3E';
        }

        // Set username
        document.getElementById('username').innerText = data.username || 'Anonymous';

        // Set bio
        document.getElementById('bio').innerText = data.bio || 'No bio added yet';

        // Populate files
        const filesList = document.getElementById('files');
        const noFiles = document.getElementById('noFiles');

        if (data.files && data.files.length > 0) {
          data.files.forEach(file => {
            const li = document.createElement('li');
            const link = document.createElement('a');
            link.href = "/" + (file.filepath || '');
            link.textContent = file.filename || 'Unnamed file';
            li.appendChild(link);
            filesList.appendChild(li);
          });
        } else {
          noFiles.style.display = 'block';
        }
      })
      .catch(error => {
        console.error('Error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').innerText = '❌ ' + (error.message || 'Failed to load profile');
      });
  </script>
</body>
</html>
